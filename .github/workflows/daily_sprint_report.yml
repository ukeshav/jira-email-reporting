name: Daily Jira Sprint Report

on:
  # ── Runs every weekday at 8:00 AM IST (2:30 AM UTC) ──────────
  # Adjust the UTC time to match your timezone:
  #   IST (India)    →  2:30 UTC   → cron: "30 16 * * *"
  #   SGT (Singapore)→  0:00 UTC   → cron: "0 0 * * 1-5"
  #   GMT (London)   →  8:00 UTC   → cron: "0 8 * * 1-5"
  #   EST (New York) → 13:00 UTC   → cron: "0 13 * * 1-5"
  schedule:
    - cron: "15 14 * * 1-5"

  # ── Also allows manual trigger from GitHub Actions UI ────────
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  send-report:
    name: Generate & Email Sprint Report
    runs-on: ubuntu-latest

    steps:

      # 1. Check out the repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up Python
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 3. Cache pip dependencies (speeds up re-runs)
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # 4. Install dependencies
      - name: Install dependencies
        run: pip install -r requirements.txt

      # 5. Write config.py from GitHub Secrets
      #    (keeps all credentials out of your code)
      - name: Write config.py from secrets
        env:
          JIRA_BASE_URL:  ${{ secrets.JIRA_BASE_URL }}
          JIRA_EMAIL:     ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          JIRA_PROJECT:   ${{ secrets.JIRA_PROJECT }}
          SMTP_HOST:      ${{ secrets.SMTP_HOST }}
          SMTP_PORT:      ${{ secrets.SMTP_PORT }}
          SMTP_USER:      ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD:  ${{ secrets.SMTP_PASSWORD }}
          EMAIL_FROM:     ${{ secrets.EMAIL_FROM }}
          EMAIL_TO:       ${{ secrets.EMAIL_TO }}
        run: python3 write_config.py

      # 6. Run the report script
      - name: Run Jira Sprint Report
        run: python jira_daily_report.py

      # 7. Upload the generated PDF & HTML as build artifacts
      #    (viewable in Actions → your run → Artifacts)
      - name: Upload report artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sprint-report-${{ github.run_id }}
          path: |
            report_*.html
            report_*.pdf
          retention-days: 30
